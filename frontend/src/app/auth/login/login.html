<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Sign in to Dance School</mat-card-title>
      <mat-card-subtitle>Manage your dance school</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="login-buttons">
        <button mat-flat-button (click)="loginWithGoogle()" class="login-btn">
          <mat-icon>login</mat-icon>
          Continue with Google
        </button>
        <button mat-flat-button (click)="loginWithGitHub()" class="login-btn">
          <mat-icon>code</mat-icon>
          Continue with GitHub
        </button>
        @if (isDev) {
          <button mat-stroked-button (click)="devLogin()" class="login-btn dev-btn">
            <mat-icon>bug_report</mat-icon>
            Dev Login
          </button>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
