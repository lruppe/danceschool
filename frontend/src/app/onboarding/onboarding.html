<div class="onboarding-container">
  <mat-card class="onboarding-card">
    <mat-card-header>
      <mat-card-title>Create Your School</mat-card-title>
      <mat-card-subtitle>Set up your dance school to get started</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="onboarding-form">
        <mat-form-field>
          <mat-label>School Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Address</mat-label>
          <input matInput formControlName="address" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
        </mat-form-field>

        <button mat-flat-button type="submit" [disabled]="form.invalid || submitting()">
          {{ submitting() ? 'Creating...' : 'Create School' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
