<div class="dashboard-content">
  @if (user(); as u) {
    @if (u.memberships.length > 0) {
      <h2>Your Schools</h2>
      @for (m of u.memberships; track m.schoolId) {
        <p>{{ m.schoolName }} ({{ m.role }})</p>
      }
    } @else {
      <p>No schools yet. Please complete onboarding.</p>
    }
  }
</div>
