databaseChangeLog:
  - changeSet:
      id: 003-create-school-member
      author: claude
      changes:
        - createTable:
            tableName: school_member
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: school_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: school_member
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_school_member_user
        - addForeignKeyConstraint:
            baseTableName: school_member
            baseColumnNames: school_id
            referencedTableName: school
            referencedColumnNames: id
            constraintName: fk_school_member_school
        - addUniqueConstraint:
            tableName: school_member
            columnNames: user_id, school_id
            constraintName: uk_school_member_user_school
