databaseChangeLog:
  - changeSet:
      id: 009-create-course
      author: claude
      changes:
        - createTable:
            tableName: course
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: school_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: dance_style
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: level
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: course_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: recurrence_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: day_of_week
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: number_of_sessions
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: teachers
                  type: VARCHAR(255)
              - column:
                  name: max_participants
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: waiting_list_enabled
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: enrollment_open_date
                  type: VARCHAR(255)
              - column:
                  name: enrollment_close_date
                  type: VARCHAR(255)
              - column:
                  name: require_role_selection
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: role_balancing_mode
                  type: VARCHAR(50)
              - column:
                  name: role_balance_threshold
                  type: INT
              - column:
                  name: price_model
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: publish_date
                  type: DATE
              - column:
                  name: enrolled_students
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: course
            baseColumnNames: school_id
            referencedTableName: school
            referencedColumnNames: id
            constraintName: fk_course_school
