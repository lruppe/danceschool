databaseChangeLog:
  - changeSet:
      id: 017-create-enrollment
      author: claude
      changes:
        - createTable:
            tableName: enrollment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: dance_role
                  type: VARCHAR(50)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: enrolled_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: enrolled_by_member_id
                  type: BIGINT
              - column:
                  name: approved_at
                  type: TIMESTAMP
              - column:
                  name: paid_at
                  type: TIMESTAMP
              - column:
                  name: waitlist_position
                  type: INT
              - column:
                  name: waitlist_reason
                  type: VARCHAR(50)

        - addForeignKeyConstraint:
            baseTableName: enrollment
            baseColumnNames: student_id
            referencedTableName: student
            referencedColumnNames: id
            constraintName: fk_enrollment_student

        - addForeignKeyConstraint:
            baseTableName: enrollment
            baseColumnNames: course_id
            referencedTableName: course
            referencedColumnNames: id
            constraintName: fk_enrollment_course

        - addForeignKeyConstraint:
            baseTableName: enrollment
            baseColumnNames: enrolled_by_member_id
            referencedTableName: school_member
            referencedColumnNames: id
            constraintName: fk_enrollment_enrolled_by

        - createIndex:
            tableName: enrollment
            indexName: idx_enrollment_course_id
            columns:
              - column:
                  name: course_id
