databaseChangeLog:
  - changeSet:
      id: 015-create-student
      author: claude
      changes:
        - createTable:
            tableName: student
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: app_user_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: school_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: student
            baseColumnNames: app_user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_student_app_user
        - addForeignKeyConstraint:
            baseTableName: student
            baseColumnNames: school_id
            referencedTableName: school
            referencedColumnNames: id
            constraintName: fk_student_school
        - addUniqueConstraint:
            tableName: student
            columnNames: app_user_id, school_id
            constraintName: uq_student_app_user_school
