databaseChangeLog:
  - changeSet:
      id: 016-create-student-dance-level
      author: claude
      changes:
        - createTable:
            tableName: student_dance_level
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: dance_style
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: level
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: student_dance_level
            baseColumnNames: student_id
            referencedTableName: student
            referencedColumnNames: id
            constraintName: fk_student_dance_level_student
        - addUniqueConstraint:
            tableName: student_dance_level
            columnNames: student_id, dance_style
            constraintName: uq_student_dance_level_style
