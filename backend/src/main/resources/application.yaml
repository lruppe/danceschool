spring:
  application:
    name: danceschool
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${FIREBASE_ISSUER_URI:https://securetoken.google.com/danceschool-dev}

app:
  security:
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:danceschool-dev}

logging:
  level:
    web: warn
    sql: warn
