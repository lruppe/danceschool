spring:
  application:
    name: danceschool
  # JWT issuer-uri is configured in application-prod.yaml only.
  # In the default (dev) profile, DevSecurityConfig provides form login with
  # in-memory users — no Firebase emulator needed.
  jpa:
    # Disable OSIV so lazy loads fail fast in the service layer instead of firing
    # during response serialization.
    open-in-view: false

app:
  security:
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    dev-auth: ${DEV_AUTH:true}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:dance-school-ch}
  image-storage:
    # Filesystem (dev) — used when prod profile is not active
    directory: ${IMAGE_STORAGE_DIRECTORY:${java.io.tmpdir}/danceschool-uploads}
    base-url: ${IMAGE_STORAGE_BASE_URL:http://localhost:8080/uploads}
    # Cloudflare R2 (prod) — required when prod profile is active
    r2-endpoint: ${R2_ENDPOINT:}
    r2-access-key: ${R2_ACCESS_KEY:}
    r2-secret-key: ${R2_SECRET_KEY:}
    r2-bucket: ${R2_BUCKET:}
    r2-public-url: ${R2_PUBLIC_URL:}

spring.servlet.multipart:
  max-file-size: 6MB
  max-request-size: 6MB

logging:
  level:
    web: warn
    sql: warn
